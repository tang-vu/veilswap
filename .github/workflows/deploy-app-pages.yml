# Hosts the VeilSwap frontend on GitHub Pages so judges can use the dApp
# without cloning anything. The build is fully static: the browser talks
# directly to Sepolia RPC and the Nox Handle Gateway.
name: deploy-app-pages

on:
  push:
    branches: [main]
    paths: ["app/**", ".github/workflows/deploy-app-pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install
        working-directory: app
      - run: pnpm build
        working-directory: app
        env:
          # A repository *variable*, not a secret: Vite inlines VITE_* at build
          # time, so this string ships inside the public JS bundle either way.
          # WalletConnect treats it as a public client identifier.
          VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist
      - id: deployment
        uses: actions/deploy-pages@v4
